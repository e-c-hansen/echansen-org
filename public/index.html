    <!-- Copy-to-clipboard email button (no mailto: handoff) -->
    <script>
        (function () {
            var btn = document.getElementById("email-copy");
            if (!btn) return;
            var hint = btn.querySelector(".email-hint");
            var resetTimer = null;
            btn.addEventListener("click", function () {
                var email = btn.getAttribute("data-email");
                var show = function (msg, ok) {
                    hint.textContent = msg;
                    btn.classList.toggle("copied", !!ok);
                    clearTimeout(resetTimer);
                    resetTimer = setTimeout(function () {
                        hint.textContent = hint.getAttribute("data-default");
                        btn.classList.remove("copied");
                    }, 1800);
                };
                var fallback = function () {
                    try {
                        var ta = document.createElement("textarea");
                        ta.value = email;
                        ta.style.position = "fixed";
                        ta.style.opacity = "0";
                        document.body.appendChild(ta);
                        ta.select();
                        var ok = document.execCommand("copy");
                        document.body.removeChild(ta);
                        show(ok ? "Copied!" : email, ok);
                    } catch (e) {
                        show(email, false); // last resort: reveal it to select manually
                    }
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(email).then(function () {
                        show("Copied!", true);
                    }, fallback);
                } else {
                    fallback();
                }
            });
        })();
    </script>

    <!-- Hidden terminal (pure client-side; works on the C++ server and on GitHub Pages) -->
    <script src="vendor/marked.min.js"></script>
